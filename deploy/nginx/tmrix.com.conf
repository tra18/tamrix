# Nginx — à copier sur le VPS Infomaniak
# /etc/nginx/sites-available/tmrix.com
# puis : sudo ln -s /etc/nginx/sites-available/tmrix.com /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# SSL : sudo certbot --nginx -d tmrix.com -d www.tmrix.com

server {
    listen 80;
    listen [::]:80;
    server_name tmrix.com www.tmrix.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
