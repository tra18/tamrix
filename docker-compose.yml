services:
  postgres:
    image: postgres:16-alpine
    container_name: tamrix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tamrix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tamrix_dev_change_me}
      POSTGRES_DB: tamrix
    ports:
      - "5432:5432"
    volumes:
      - tamrix_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamrix -d tamrix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tamrix_pg_data:
